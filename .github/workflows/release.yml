name: Release Skin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v0.1.3)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build skin
        run: pnpm build

      - name: Stamp release manifest
        env:
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          node <<'EOF'
          const fs = require("node:fs");
          const path = require("node:path");

          const manifestPath = path.join(process.cwd(), "dist", "manifest.json");
          const releaseTag = process.env.RELEASE_TAG;
          const repositoryUrl = process.env.REPOSITORY_URL;

          if (!releaseTag) {
            throw new Error("Missing RELEASE_TAG");
          }

          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          manifest.version = releaseTag.replace(/^v/, "");
          manifest.repository = repositoryUrl;
          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          EOF

      - name: Create release archive
        env:
          RELEASE_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          cd dist
          zip -r "../espresso-cockpit-${RELEASE_VERSION}.zip" .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: espresso-cockpit-${{ env.RELEASE_TAG }}.zip
          generate_release_notes: true
